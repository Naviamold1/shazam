<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shazam</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        background: #111;
        color: #fff;
        font-family: system-ui, sans-serif;
      }

      main {
        width: min(100%, 480px);
        text-align: center;
      }

      h1 {
        margin: 0 0 24px;
      }

      button {
        width: 180px;
        height: 180px;
        border: 0;
        border-radius: 50%;
        background: #1db954;
        color: #fff;
        font: inherit;
        font-size: 1.2rem;
        font-weight: 700;
        cursor: pointer;
      }

      button.recording {
        background: #e53935;
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      #status {
        min-height: 24px;
        margin: 24px 0;
        color: #bbb;
      }

      #results {
        margin: 0;
        padding: 0;
        list-style: none;
        text-align: left;
      }

      #results li {
        margin-top: 8px;
        padding: 12px;
        border-radius: 8px;
        background: #222;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Identify Song!</h1>
      <button id="listen" type="button">Find Song</button>
      <p id="status" role="status">Ready</p>
      <ul id="results" aria-live="polite"></ul>
    </main>

    <script>
      const listenButton = document.getElementById("listen");
      const status = document.getElementById("status");
      const results = document.getElementById("results");
      const protocol = location.protocol === "https:" ? "wss:" : "ws:";
      const socket = new WebSocket(`${protocol}//${location.host}/ws`);

      let stream;
      let recorder;
      let chunks = [];
      let startedAt = 0;

      socket.addEventListener("close", () => {
        status.textContent = "Disconnected. Refresh the page to reconnect.";
        listenButton.disabled = true;
      });

      socket.addEventListener("message", (event) => {
        const message = JSON.parse(event.data);
        listenButton.disabled = false;
        listenButton.textContent = "Start listening";

        if (message.type === "match") {
          showResults(message.candidates || []);
        }
      });

      listenButton.addEventListener("click", () => {
        if (recorder?.state === "recording") {
          stopListening();
        } else {
          startListening();
        }
      });

      async function startListening() {
        if (!navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
          status.textContent = "Microphone access is not available.";
          return;
        }

        if (socket.readyState !== WebSocket.OPEN) {
          status.textContent = "Still connecting to the recognizer.";
          return;
        }

        try {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          chunks = [];
          recorder = new MediaRecorder(stream);
          recorder.addEventListener("dataavailable", (event) => {
            if (event.data.size) chunks.push(event.data);
          });
          recorder.start();
          startedAt = Date.now();
          listenButton.textContent = "Stop and identify";
          listenButton.classList.add("recording");
          status.textContent = "Listening through microphone...";
          results.replaceChildren();
        } catch (error) {
          stopMicrophone();
          status.textContent = error.message || "Could not access microphone.";
        }
      }

      function stopListening() {
        recorder.addEventListener(
          "stop",
          async () => {
            stopMicrophone();
            listenButton.classList.remove("recording");

            if (Date.now() - startedAt < 1500) {
              status.textContent = "Record for a little longer and try again.";
              listenButton.textContent = "Start listening";
              return;
            }

            const audio = new Blob(chunks, {
              type: recorder.mimeType || "audio/webm",
            });
            socket.send(await audio.arrayBuffer());
            listenButton.textContent = "Matching...";
            listenButton.disabled = true;
            status.textContent = "Finding a match...";
          },
          { once: true },
        );

        recorder.stop();
      }

      function stopMicrophone() {
        stream?.getTracks().forEach((track) => track.stop());
        stream = null;
      }

      function showResults(candidates) {
        results.replaceChildren();

        if (!candidates.length) {
          status.textContent = "No match found. Try a longer clip.";
          return;
        }

        status.textContent = `Best match: ${candidates[0].title}`;
        for (const candidate of candidates) {
          const item = document.createElement("li");
          item.textContent = `${candidate.title} — ${Math.round(candidate.confidence || 0)}%`;
          results.appendChild(item);
        }
      }
    </script>
  </body>
</html>
